<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provador Virtual IA - WillWeb</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { font-size: 24px; margin-bottom: 5px; text-align: center; }
        p { color: #aaaaaa; margin-bottom: 25px; text-align: center; font-size: 14px; }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            background-color: #000;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            transform: scaleX(-1); /* Efeito espelho */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Acompanha o espelho do vídeo */
            pointer-events: none;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ffaa00;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
        }

        .btn-analisar {
            margin-top: 25px;
            padding: 15px 30px;
            background-color: #444;
            color: #888;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.3s;
            width: 100%;
            max-width: 400px;
        }

        .btn-analisar.pronto {
            background-color: #0866ff;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(8, 102, 255, 0.4);
        }
    </style>
</head>
<body>

    <h1>Provador Virtual de Óculos</h1>
    <p>Experimente armações em tempo real com IA.</p>

    <div class="camera-container">
        <div class="status-badge" id="status-ia">Carregando IA...</div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <button class="btn-analisar" id="btn-analisar" disabled>Aguarde...</button>

    <img id="img-oculos" src="oculos.png" style="display:none;">

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusIA = document.getElementById('status-ia');
        const btnAnalisar = document.getElementById('btn-analisar');
        const imgOculos = document.getElementById('img-oculos');

        const MODELS_URL = 'https://vladmandic.github.io/face-api/model/';
        let provadorAtivo = false;

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (err) {
                statusIA.textContent = "Erro na câmera.";
                console.error(err);
            }
        }

        async function carregarIA() {
            try {
                // Carrega os modelos de detecção de rosto e pontos faciais
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODELS_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODELS_URL)
                ]);

                // Garante que a imagem do óculos também carregou (essencial para evitar erro no canvas)
                if (!imgOculos.complete) {
                    statusIA.textContent = "Carregando imagem...";
                    await new Promise(resolve => imgOculos.onload = resolve);
                }
                
                statusIA.textContent = "Pronto!";
                statusIA.style.color = "#00ff00";
                setTimeout(() => statusIA.style.display = 'none', 2000);
                
                btnAnalisar.textContent = "Ligar Provador Virtual";
                btnAnalisar.classList.add('pronto');
                btnAnalisar.disabled = false;

            } catch (e) {
                statusIA.textContent = "Erro ao carregar IA.";
                console.error(e);
            }
        }

        // Loop em Tempo Real
        async function loopProvador() {
            if (video.paused || video.ended || !provadorAtivo) return;

            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            
            // Garante que o canvas tem o mesmo tamanho interno do vídeo
            if (overlay.width !== displaySize.width) {
                faceapi.matchDimensions(overlay, displaySize);
            }

            // Escaneia o rosto a cada frame
            const deteccoes = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height); // Limpa o desenho anterior

            if (deteccoes) {
                const resizedDetections = faceapi.resizeResults(deteccoes, displaySize);
                const landmarks = resizedDetections.landmarks;

                // Captura a ponta exterior do olho esquerdo (ponto 36) e do direito (ponto 45)
                const olhoEsq = landmarks.positions[36];
                const olhoDir = landmarks.positions[45];

                // 1. Calcula a largura do óculos
                const dx = olhoDir.x - olhoEsq.x;
                const dy = olhoDir.y - olhoEsq.y;
                const distanciaOlhos = Math.sqrt(dx * dx + dy * dy);
                const larguraOculos = distanciaOlhos * 2.2; // Multiplicador para cobrir a têmpora

                // 2. Calcula a altura proporcional
                // Se a imagem não carregou, evita divisão por zero
                if (imgOculos.width === 0) return requestAnimationFrame(loopProvador);
                const proporcaoImagem = imgOculos.height / imgOculos.width;
                const alturaOculos = larguraOculos * proporcaoImagem;

                // 3. Calcula a inclinação da cabeça
                const angulo = Math.atan2(dy, dx);

                // 4. Calcula o centro
                const centroX = (olhoEsq.x + olhoDir.x) / 2;
                const centroY = (olhoEsq.y + olhoDir.y) / 2;

                // Desenha o óculos no canvas
                ctx.save();
                ctx.translate(centroX, centroY);
                ctx.rotate(angulo);
                // Centraliza a imagem no ponto calculado
                ctx.drawImage(imgOculos, -larguraOculos / 2, -alturaOculos / 2, larguraOculos, alturaOculos);
                ctx.restore();
            }

            // Chama o próximo frame
            requestAnimationFrame(loopProvador);
        }

        btnAnalisar.addEventListener('click', () => {
            if (!provadorAtivo) {
                // Tenta forçar o carregamento da imagem se não tiver
                if (!imgOculos.complete || imgOculos.width === 0) {
                    alert("A imagem do óculos ainda não carregou ou não foi encontrada no repositório. Verifique se o arquivo 'oculos.png' existe.");
                    return;
                }
                provadorAtivo = true;
                btnAnalisar.textContent = "Desligar Provador";
                btnAnalisar.style.backgroundColor = "#ff4444";
                loopProvador();
            } else {
                provadorAtivo = false;
                btnAnalisar.textContent = "Ligar Provador Virtual";
                btnAnalisar.style.backgroundColor = "#0866ff";
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
            }
        });

        window.addEventListener('load', () => {
            iniciarCamera();
            carregarIA(); 
        });
    </script>
</body>
</html>
